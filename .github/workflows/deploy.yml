name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  GODOT_VERSION: "4.7"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Godot binary and export templates
        uses: actions/cache@v4
        with:
          path: |
            ~/godot-bin
            ~/.local/share/godot/export_templates
          key: godot-${{ env.GODOT_VERSION }}-stable

      - name: Download Godot and export templates
        run: |
          if [ ! -x ~/godot-bin/godot ]; then
            mkdir -p ~/godot-bin
            curl -fsSL -o godot.zip "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
            unzip -q godot.zip
            mv "Godot_v${GODOT_VERSION}-stable_linux.x86_64" ~/godot-bin/godot
          fi
          TPL_DIR="$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          if [ ! -d "$TPL_DIR" ]; then
            curl -fsSL -o templates.tpz "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
            mkdir -p "$HOME/.local/share/godot/export_templates"
            unzip -q templates.tpz -d /tmp/godot-templates
            mv /tmp/godot-templates/templates "$TPL_DIR"
          fi
          ~/godot-bin/godot --version

      - name: Import project
        run: ~/godot-bin/godot --headless --path . --import

      - name: Export web build
        run: |
          mkdir -p build/web
          ~/godot-bin/godot --headless --path . --export-release "Web" build/web/index.html
          ls -lh build/web

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
